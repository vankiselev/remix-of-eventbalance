name: Deploy to Self-Hosted Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

  workflow_dispatch:

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      - name: Create execute_migration function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "🔧 Creating execute_migration function..."
          
          bootstrap_sql=$(cat <<'EOF'
CREATE OR REPLACE FUNCTION public.execute_migration(sql_query TEXT)
RETURNS TEXT
LANGUAGE plpgsql
SECURITY DEFINER
AS $$
BEGIN
  EXECUTE sql_query;
  RETURN 'Success';
EXCEPTION
  WHEN OTHERS THEN
    RETURN 'Error: ' || SQLERRM;
END;
$$;

GRANT EXECUTE ON FUNCTION public.execute_migration TO service_role;
GRANT EXECUTE ON FUNCTION public.execute_migration TO anon;
GRANT EXECUTE ON FUNCTION public.execute_migration TO authenticated;
EOF
)
          
          # Try to create via direct SQL query endpoint (some self-hosted setups have this)
          response=$(curl -s -w "\n%{http_code}" -X POST "$SUPABASE_URL/rest/v1/rpc/query" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(echo "$bootstrap_sql" | jq -Rs .)}" 2>/dev/null)
          
          http_code=$(echo "$response" | tail -n1)
          
          if [ "$http_code" -eq 200 ] || [ "$http_code" -eq 204 ]; then
            echo "✅ Function created successfully"
          else
            echo "⚠️  Could not create via query endpoint, trying alternative..."
            
            # Alternative: Use psql if available
            if command -v psql &> /dev/null; then
              echo "$bootstrap_sql" | psql "$SUPABASE_DB_URL" 2>/dev/null && echo "✅ Created via psql"
            else
              echo "⚠️  Function may already exist or need manual creation"
            fi
          fi
      
      - name: Apply migrations
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "🚀 Starting migration deployment..."
          
          if [ ! -d "supabase/migrations" ]; then
            echo "❌ No migrations directory found"
            exit 1
          fi
          
          migration_count=$(ls -1 supabase/migrations/*.sql 2>/dev/null | wc -l)
          echo "📊 Found $migration_count migration(s)"
          
          if [ $migration_count -eq 0 ]; then
            echo "⚠️  No migrations to apply"
            exit 0
            
          fi
          
          for migration in supabase/migrations/*.sql; do
            migration_name=$(basename "$migration")
            sql_content=$(cat "$migration" | jq -Rs .)
            
            echo "📝 Applying: $migration_name"
            
            response=$(curl -s -w "\n%{http_code}" -X POST "$SUPABASE_URL/rest/v1/rpc/execute_migration" \
              -H "apikey: $SUPABASE_SERVICE_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"sql_query\": $sql_content}")
            
            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | head -n-1)
            
            if [ "$http_code" -eq 200 ]; then
              echo "✅ Success: $migration_name"
            else
              echo "❌ Failed: $migration_name (HTTP $http_code)"
              echo "   Response: $body"
              exit 1
            fi
            
            echo ""
          done
          
          echo "🎉 All migrations applied successfully!"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Migration deployment failed!"
          echo "Check the logs above for details."