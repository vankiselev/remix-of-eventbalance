name: Deploy Edge Functions to Self-Hosted Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: self-hosted
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      WORKFLOW_NAME: Deploy Edge Functions to Self-Hosted Supabase
      RUN_TITLE: ${{ github.event.head_commit.message || github.workflow }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify Telegram about start
        run: |
          chmod +x .github/scripts/send-telegram.sh
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TASK_TITLE="$(printf '%s\n' "${RUN_TITLE}" | head -n 1)"
          DISPLAY_TITLE="Функция (${TASK_TITLE})"
          cat > "$RUNNER_TEMP/telegram_start.txt" <<EOF
          <b>СТАТУС: СОЗДАНО</b>

          Название: ${DISPLAY_TITLE}
          Этап: В очереди / выполняется
          Репозиторий: ${{ github.repository }}
          Автор: ${{ github.actor }}
          Ссылка: ${RUN_URL}
          EOF
          .github/scripts/send-telegram.sh "$RUNNER_TEMP/telegram_start.txt"
      
      - name: Find Edge Runtime container + functions path
        id: find-target
        continue-on-error: true
        run: |
          set -o pipefail
          {
            echo "🔍 Looking for Edge Runtime container and functions directory..."

            CANDIDATES=$(docker ps --format '{{.Names}}' | grep -E 'supabase|edge|runtime|functions' || true)

            if [ -z "$CANDIDATES" ]; then
              echo "❌ No candidate containers found"
              docker ps --format '{{.Names}}'
              exit 1
            fi

            PATHS="/home/deno/functions /app/functions /var/lib/supabase/functions"

            for c in $CANDIDATES; do
              for p in $PATHS; do
                if docker exec "$c" sh -lc "test -d '$p'" >/dev/null 2>&1; then
                  echo "✅ Using container: $c"
                  echo "✅ Functions path: $p"
                  echo "container=$c" >> "$GITHUB_OUTPUT"
                  echo "functions_path=$p" >> "$GITHUB_OUTPUT"
                  exit 0
                fi
              done
            done

            echo "❌ Could not find an Edge Runtime container with a functions directory."
            echo "Candidates were:"
            echo "$CANDIDATES" | sed 's/^/  - /'
            exit 1
          } 2>&1 | tee "$RUNNER_TEMP/find_target.log"
      
      - name: List functions to deploy
        id: list_functions
        if: steps.find-target.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            echo "📋 Functions to deploy:"
            ls -la supabase/functions/ | grep "^d" | awk '{print "  - " $NF}' | grep -v "^\s*-\s*\.$"
            
            FUNC_COUNT=$(ls -d supabase/functions/*/ 2>/dev/null | wc -l)
            echo ""
            echo "📊 Total: $FUNC_COUNT function(s)"
          } 2>&1 | tee "$RUNNER_TEMP/list_functions.log"
      
      - name: Deploy functions to container
        id: deploy_functions
        if: steps.find-target.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            CONTAINER="${{ steps.find-target.outputs.container }}"
            TARGET="${{ steps.find-target.outputs.functions_path }}"
            
            echo "🚀 Deploying functions to $CONTAINER -> $TARGET ..."
            docker exec "$CONTAINER" sh -lc "mkdir -p '$TARGET'"
            docker cp supabase/functions/. "$CONTAINER:$TARGET/"
            
            if [ $? -eq 0 ]; then
              echo "✅ Functions copied successfully"
            else
              echo "❌ Failed to copy functions"
              exit 1
            fi
          } 2>&1 | tee "$RUNNER_TEMP/deploy_functions.log"
      
      - name: Restart Edge Runtime
        id: restart_runtime
        if: steps.deploy_functions.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            CONTAINER="${{ steps.find-target.outputs.container }}"

            echo "🔄 Restarting $CONTAINER to apply changes..."
            docker restart "$CONTAINER" >/dev/null

            echo "⏳ Waiting for container to be ready..."
            READY=0
            for i in $(seq 1 30); do
              STATE=$(docker inspect -f '{{.State.Status}}|{{.State.Running}}|{{.State.Restarting}}|{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}|{{.State.ExitCode}}' "$CONTAINER" 2>/dev/null || echo "missing|false|false|none|1")
              STATUS=$(echo "$STATE" | cut -d'|' -f1)
              RUNNING=$(echo "$STATE" | cut -d'|' -f2)
              RESTARTING=$(echo "$STATE" | cut -d'|' -f3)
              HEALTH=$(echo "$STATE" | cut -d'|' -f4)
              EXIT_CODE=$(echo "$STATE" | cut -d'|' -f5)

              echo "   [$i/30] status=$STATUS running=$RUNNING restarting=$RESTARTING health=$HEALTH exit_code=$EXIT_CODE"

              if [ "$RUNNING" = "true" ] && { [ "$HEALTH" = "healthy" ] || [ "$HEALTH" = "none" ] || [ "$HEALTH" = "starting" ]; }; then
                READY=1
                break
              fi

              if [ "$STATUS" = "exited" ] || [ "$STATUS" = "dead" ]; then
                break
              fi

              sleep 2
            done

            if [ "$READY" -eq 1 ]; then
              echo "✅ Container restarted successfully"
            else
              echo "❌ Container failed to restart"
              echo "🔎 docker inspect:"
              docker inspect "$CONTAINER" --format '{{json .State}}' || true
              echo "🔎 container logs (tail 80):"
              docker logs "$CONTAINER" --tail 80 || true
              exit 1
            fi
          } 2>&1 | tee "$RUNNER_TEMP/restart_runtime.log"
      
      - name: Verify deployment
        id: verify_deployment
        if: steps.restart_runtime.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            CONTAINER="${{ steps.find-target.outputs.container }}"
            TARGET="${{ steps.find-target.outputs.functions_path }}"
            
            echo "🔍 Verifying deployed functions..."
            docker exec "$CONTAINER" sh -lc "ls -la '$TARGET'" 2>/dev/null || echo "⚠️ Could not list functions directory in container"

            REQUIRED_FUNCS="check-transaction-description suggest-transaction-fields voice-transaction"
            MISSING=0
            for fn in $REQUIRED_FUNCS; do
              if ! docker exec "$CONTAINER" sh -lc "test -f '$TARGET/$fn/index.ts'" >/dev/null 2>&1; then
                echo "❌ Missing entrypoint: $TARGET/$fn/index.ts"
                MISSING=1
              else
                echo "✅ Entrypoint OK: $fn/index.ts"
              fi
            done

            if [ "$MISSING" -ne 0 ]; then
              echo ""
              echo "🔎 Debug tree (index files):"
              docker exec "$CONTAINER" sh -lc "find '$TARGET' -maxdepth 2 -type f -name 'index.*' -print" || true
              exit 1
            fi
            
            echo ""
            echo "🎉 Edge Functions deployment complete!"
          } 2>&1 | tee "$RUNNER_TEMP/verify_deployment.log"
      
      - name: Notify Telegram and finish
        if: always()
        run: |
          chmod +x .github/scripts/send-telegram.sh
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TASK_TITLE="$(printf '%s\n' "${RUN_TITLE}" | head -n 1)"
          DISPLAY_TITLE="Функция (${TASK_TITLE})"
          STATUS="success"
          STAGE="completed"
          ERROR_DETAILS=""

          if [ "${{ steps.find-target.outcome }}" != "success" ]; then
            STATUS="failure"
            STAGE="find edge runtime container"
            ERROR_DETAILS="$(tail -n 30 "$RUNNER_TEMP/find_target.log" 2>/dev/null || echo "Target discovery failed before logs were captured.")"
          elif [ "${{ steps.list_functions.outcome }}" = "failure" ]; then
            STATUS="failure"
            STAGE="list functions to deploy"
            ERROR_DETAILS="$(tail -n 30 "$RUNNER_TEMP/list_functions.log" 2>/dev/null || echo "Function listing failed before logs were captured.")"
          elif [ "${{ steps.deploy_functions.outcome }}" != "success" ]; then
            STATUS="failure"
            STAGE="copy functions into container"
            ERROR_DETAILS="$(tail -n 30 "$RUNNER_TEMP/deploy_functions.log" 2>/dev/null || echo "Function copy failed before logs were captured.")"
          elif [ "${{ steps.restart_runtime.outcome }}" != "success" ]; then
            STATUS="failure"
            STAGE="restart edge runtime"
            ERROR_DETAILS="$(tail -n 30 "$RUNNER_TEMP/restart_runtime.log" 2>/dev/null || echo "Runtime restart failed before logs were captured.")"
          elif [ "${{ steps.verify_deployment.outcome }}" != "success" ]; then
            STATUS="failure"
            STAGE="verify deployment"
            ERROR_DETAILS="$(tail -n 40 "$RUNNER_TEMP/verify_deployment.log" 2>/dev/null || echo "Deployment verification failed before logs were captured.")"
          fi

          if [ "$STATUS" = "success" ]; then
            cat > "$RUNNER_TEMP/telegram_finish.txt" <<EOF
          <b>СТАТУС: УСПЕШНО</b>

          Название: ${DISPLAY_TITLE}
          Этап: Завершено
          Репозиторий: ${{ github.repository }}
          Автор: ${{ github.actor }}
          Ссылка: ${RUN_URL}
          EOF
          else
            STAGE_RU="$STAGE"
            if [ "$STAGE" = "find edge runtime container" ]; then
              STAGE_RU="Поиск контейнера Edge Runtime"
            elif [ "$STAGE" = "list functions to deploy" ]; then
              STAGE_RU="Подготовка списка функций"
            elif [ "$STAGE" = "copy functions into container" ]; then
              STAGE_RU="Копирование функций в контейнер"
            elif [ "$STAGE" = "restart edge runtime" ]; then
              STAGE_RU="Перезапуск Edge Runtime"
            elif [ "$STAGE" = "verify deployment" ]; then
              STAGE_RU="Проверка деплоя"
            fi
            cat > "$RUNNER_TEMP/telegram_finish.txt" <<EOF
          <b>СТАТУС: ОШИБКА</b>

          Название: ${DISPLAY_TITLE}
          Этап: ${STAGE_RU}
          Репозиторий: ${{ github.repository }}
          Автор: ${{ github.actor }}
          Ссылка: ${RUN_URL}

          Ошибка:
          ${ERROR_DETAILS}
          EOF
          fi

          .github/scripts/send-telegram.sh "$RUNNER_TEMP/telegram_finish.txt"

          if [ "$STATUS" != "success" ]; then
            exit 1
          fi
