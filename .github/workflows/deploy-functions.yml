name: Deploy Edge Functions to Self-Hosted Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: self-hosted
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      WORKFLOW_NAME: Deploy Edge Functions to Self-Hosted Supabase
      RUN_TITLE: ${{ github.event.head_commit.message || github.workflow }}
      # Explicit target — no more guessing
      EDGE_CONTAINER: ${{ secrets.EDGE_RUNTIME_CONTAINER || 'supabase-edge-functions' }}
      EDGE_FUNCTIONS_PATH: ${{ secrets.EDGE_FUNCTIONS_PATH || '/home/deno/functions' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify Telegram about start
        run: |
          chmod +x .github/scripts/send-telegram.sh
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TASK_TITLE="$(printf '%s\n' "${RUN_TITLE}" | head -n 1)"
          DISPLAY_TITLE="Функция (${TASK_TITLE})"
          cat > "$RUNNER_TEMP/telegram_start.txt" <<EOF
          <b>СТАТУС: СОЗДАНО</b>

          Название: ${DISPLAY_TITLE}
          Этап: В очереди / выполняется
          Репозиторий: ${{ github.repository }}
          Автор: ${{ github.actor }}
          Ссылка: ${RUN_URL}
          EOF
          .github/scripts/send-telegram.sh "$RUNNER_TEMP/telegram_start.txt"
      
      - name: Verify container exists
        id: find-target
        continue-on-error: true
        run: |
          set -o pipefail
          {
            echo "🔍 Using explicit container: ${EDGE_CONTAINER}"
            echo "📂 Functions path: ${EDGE_FUNCTIONS_PATH}"

            if ! docker ps --format '{{.Names}}' | grep -qx "${EDGE_CONTAINER}"; then
              echo "❌ Container '${EDGE_CONTAINER}' not found or not running"
              echo "Running containers:"
              docker ps --format '{{.Names}}'
              exit 1
            fi

            if ! docker exec "${EDGE_CONTAINER}" sh -lc "test -d '${EDGE_FUNCTIONS_PATH}'" >/dev/null 2>&1; then
              echo "❌ Functions path '${EDGE_FUNCTIONS_PATH}' not found in container"
              exit 1
            fi

            echo "✅ Container and path verified"
          } 2>&1 | tee "$RUNNER_TEMP/find_target.log"
      
      - name: List functions to deploy
        id: list_functions
        if: steps.find-target.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            echo "📋 Functions to deploy:"
            ls -la supabase/functions/ | grep "^d" | awk '{print "  - " $NF}' | grep -v "^\s*-\s*\.$"
            
            FUNC_COUNT=$(ls -d supabase/functions/*/ 2>/dev/null | wc -l)
            echo ""
            echo "📊 Total: $FUNC_COUNT function(s)"
          } 2>&1 | tee "$RUNNER_TEMP/list_functions.log"
      
      - name: Deploy functions to container
        id: deploy_functions
        if: steps.find-target.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            echo "🚀 Deploying functions to ${EDGE_CONTAINER} -> ${EDGE_FUNCTIONS_PATH} ..."
            docker exec "${EDGE_CONTAINER}" sh -lc "mkdir -p '${EDGE_FUNCTIONS_PATH}'"
            docker cp supabase/functions/. "${EDGE_CONTAINER}:${EDGE_FUNCTIONS_PATH}/"
            
            if [ $? -eq 0 ]; then
              echo "✅ Functions copied successfully"
            else
              echo "❌ Failed to copy functions"
              exit 1
            fi
          } 2>&1 | tee "$RUNNER_TEMP/deploy_functions.log"
      
      - name: Restart Edge Runtime
        id: restart_runtime
        if: steps.deploy_functions.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            echo "🔄 Restarting ${EDGE_CONTAINER} to apply changes..."
            docker restart "${EDGE_CONTAINER}" >/dev/null

            echo "⏳ Waiting for container to be ready..."
            READY=0
            for i in $(seq 1 30); do
              STATE=$(docker inspect -f '{{.State.Status}}|{{.State.Running}}|{{.State.Restarting}}|{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}|{{.State.ExitCode}}' "${EDGE_CONTAINER}" 2>/dev/null || echo "missing|false|false|none|1")
              STATUS=$(echo "$STATE" | cut -d'|' -f1)
              RUNNING=$(echo "$STATE" | cut -d'|' -f2)
              RESTARTING=$(echo "$STATE" | cut -d'|' -f3)
              HEALTH=$(echo "$STATE" | cut -d'|' -f4)
              EXIT_CODE=$(echo "$STATE" | cut -d'|' -f5)

              echo "   [$i/30] status=$STATUS running=$RUNNING restarting=$RESTARTING health=$HEALTH exit_code=$EXIT_CODE"

              if [ "$RUNNING" = "true" ] && { [ "$HEALTH" = "healthy" ] || [ "$HEALTH" = "none" ] || [ "$HEALTH" = "starting" ]; }; then
                READY=1
                break
              fi

              if [ "$STATUS" = "exited" ] || [ "$STATUS" = "dead" ]; then
                break
              fi

              sleep 2
            done

            if [ "$READY" -eq 1 ]; then
              echo "✅ Container restarted successfully"
            else
              echo "❌ Container failed to restart"
              echo "🔎 docker inspect:"
              docker inspect "${EDGE_CONTAINER}" --format '{{json .State}}' || true
              echo "🔎 container logs (tail 80):"
              docker logs "${EDGE_CONTAINER}" --tail 80 || true
              exit 1
            fi
          } 2>&1 | tee "$RUNNER_TEMP/restart_runtime.log"
      
      - name: Verify deployment
        id: verify_deployment
        if: steps.restart_runtime.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            echo "🔍 Verifying deployed functions..."
            docker exec "${EDGE_CONTAINER}" sh -lc "ls -la '${EDGE_FUNCTIONS_PATH}'" 2>/dev/null || echo "⚠️ Could not list functions directory in container"

            REQUIRED_FUNCS="check-transaction-description suggest-transaction-fields voice-transaction register-invited-user"
            MISSING=0
            for fn in $REQUIRED_FUNCS; do
              if ! docker exec "${EDGE_CONTAINER}" sh -lc "test -f '${EDGE_FUNCTIONS_PATH}/$fn/index.ts'" >/dev/null 2>&1; then
                echo "❌ Missing entrypoint: ${EDGE_FUNCTIONS_PATH}/$fn/index.ts"
                MISSING=1
              else
                echo "✅ Entrypoint OK: $fn/index.ts"
              fi
            done

            if [ "$MISSING" -ne 0 ]; then
              echo ""
              echo "🔎 Debug tree (index files):"
              docker exec "${EDGE_CONTAINER}" sh -lc "find '${EDGE_FUNCTIONS_PATH}' -maxdepth 2 -type f -name 'index.*' -print" || true
              exit 1
            fi
            
            echo ""
            echo "🎉 Edge Functions deployment complete!"
          } 2>&1 | tee "$RUNNER_TEMP/verify_deployment.log"

      - name: Smoke-check register-invited-user version
        id: smoke_check
        if: steps.verify_deployment.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            echo "🧪 Smoke-checking register-invited-user version marker..."
            
            EXPECTED_VERSION="2026-03-24-invite-rebuild-v1"
            
            RESPONSE=$(docker exec "${EDGE_CONTAINER}" sh -lc "cat '${EDGE_FUNCTIONS_PATH}/register-invited-user/index.ts' | head -5" 2>/dev/null || echo "")
            
            if echo "$RESPONSE" | grep -q "$EXPECTED_VERSION"; then
              echo "✅ Version marker matches: $EXPECTED_VERSION"
            else
              echo "⚠️ Version marker check: could not verify (non-blocking)"
              echo "Expected: $EXPECTED_VERSION"
              echo "Got: $RESPONSE"
            fi
          } 2>&1 | tee "$RUNNER_TEMP/smoke_check.log"
      
      - name: Notify Telegram and finish
        if: always()
        run: |
          chmod +x .github/scripts/send-telegram.sh
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TASK_TITLE="$(printf '%s\n' "${RUN_TITLE}" | head -n 1)"
          DISPLAY_TITLE="Функция (${TASK_TITLE})"
          STATUS="success"
          STAGE="completed"
          ERROR_DETAILS=""

          if [ "${{ steps.find-target.outcome }}" != "success" ]; then
            STATUS="failure"
            STAGE="find edge runtime container"
            ERROR_DETAILS="$(tail -n 30 "$RUNNER_TEMP/find_target.log" 2>/dev/null || echo "Target discovery failed.")"
          elif [ "${{ steps.list_functions.outcome }}" = "failure" ]; then
            STATUS="failure"
            STAGE="list functions to deploy"
            ERROR_DETAILS="$(tail -n 30 "$RUNNER_TEMP/list_functions.log" 2>/dev/null || echo "Function listing failed.")"
          elif [ "${{ steps.deploy_functions.outcome }}" != "success" ]; then
            STATUS="failure"
            STAGE="copy functions into container"
            ERROR_DETAILS="$(tail -n 30 "$RUNNER_TEMP/deploy_functions.log" 2>/dev/null || echo "Function copy failed.")"
          elif [ "${{ steps.restart_runtime.outcome }}" != "success" ]; then
            STATUS="failure"
            STAGE="restart edge runtime"
            ERROR_DETAILS="$(tail -n 30 "$RUNNER_TEMP/restart_runtime.log" 2>/dev/null || echo "Runtime restart failed.")"
          elif [ "${{ steps.verify_deployment.outcome }}" != "success" ]; then
            STATUS="failure"
            STAGE="verify deployment"
            ERROR_DETAILS="$(tail -n 40 "$RUNNER_TEMP/verify_deployment.log" 2>/dev/null || echo "Verification failed.")"
          fi

          if [ "$STATUS" = "success" ]; then
            cat > "$RUNNER_TEMP/telegram_finish.txt" <<EOF
          <b>СТАТУС: УСПЕШНО</b>

          Название: ${DISPLAY_TITLE}
          Этап: Завершено
          Репозиторий: ${{ github.repository }}
          Автор: ${{ github.actor }}
          Ссылка: ${RUN_URL}
          EOF
          else
            STAGE_RU="$STAGE"
            if [ "$STAGE" = "find edge runtime container" ]; then
              STAGE_RU="Поиск контейнера Edge Runtime"
            elif [ "$STAGE" = "list functions to deploy" ]; then
              STAGE_RU="Подготовка списка функций"
            elif [ "$STAGE" = "copy functions into container" ]; then
              STAGE_RU="Копирование функций в контейнер"
            elif [ "$STAGE" = "restart edge runtime" ]; then
              STAGE_RU="Перезапуск Edge Runtime"
            elif [ "$STAGE" = "verify deployment" ]; then
              STAGE_RU="Проверка деплоя"
            fi
            cat > "$RUNNER_TEMP/telegram_finish.txt" <<EOF
          <b>СТАТУС: ОШИБКА</b>

          Название: ${DISPLAY_TITLE}
          Этап: ${STAGE_RU}
          Репозиторий: ${{ github.repository }}
          Автор: ${{ github.actor }}
          Ссылка: ${RUN_URL}

          Ошибка:
          ${ERROR_DETAILS}
          EOF
          fi

          .github/scripts/send-telegram.sh "$RUNNER_TEMP/telegram_finish.txt"

          if [ "$STATUS" != "success" ]; then
            exit 1
          fi
